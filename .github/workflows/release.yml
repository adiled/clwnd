name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build all
        run: bun run build

      - name: Publish @clwnd/opencode
        working-directory: plugins/opencode
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BODY=$(git for-each-ref "refs/tags/$TAG" --format='%(contents)' 2>/dev/null)
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
            BODY=$(git log --pretty=format:"- %s" ${PREV}..${TAG} 2>/dev/null || echo "Release $TAG")
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
